<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>calm focus log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #e8e4dc;
    --surface: #f2efe8;
    --surface-inset: #ddd8cf;
    --text: #3d3429;
    --text-dim: #7a7064;
    --border: #c8c0b4;
    --accent: #c4695a;
    --accent-hover: #b05548;
    --heatmap-empty: #e0dcd4;
    --heatmap-light: #d4dfc9;
    --heatmap-mid: #a3b896;
    --heatmap-full: #6b8f5e;
    --session-color: #8fa67a;
    --shadow: 0 2px 8px rgba(61, 52, 41, 0.08), 0 1px 2px rgba(61, 52, 41, 0.06);
    --shadow-lg: 0 8px 24px rgba(61, 52, 41, 0.12), 0 2px 6px rgba(61, 52, 41, 0.06);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-pill: 999px;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  body {
    padding: 2rem 1rem 3rem;
    display: flex;
    justify-content: center;
  }

  .app-window {
    width: 100%;
    max-width: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    padding: 1.5rem;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  h1 {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.01em;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 0.45rem 1rem;
    border-radius: var(--radius-pill);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: background 0.15s, transform 0.1s;
  }

  .btn:hover {
    background: var(--surface-inset);
  }

  .btn:active {
    transform: translateY(1px);
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent-hover);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
  }

  .btn-dim {
    background: var(--surface-inset);
    color: var(--text-dim);
    box-shadow: none;
  }

  .btn-dim:hover {
    color: var(--text);
    background: var(--surface-inset);
  }

  /* heatmap card */
  .heatmap-section {
    margin-bottom: 1.25rem;
  }

  .heatmap-card {
    background: var(--surface-inset);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    box-shadow: inset 0 1px 3px rgba(61, 52, 41, 0.06);
  }

  .heatmap-wrap {
    width: 100%;
    overflow: visible;
    padding: 3px;
  }

  .heatmap {
    display: grid;
    grid-template-rows: repeat(7, 1fr);
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    gap: 3px;
    width: 100%;
    aspect-ratio: var(--heatmap-cols, 13) / 7;
  }

  .cell {
    width: 100%;
    aspect-ratio: 1;
    min-width: 0;
    border-radius: 3px;
    border: 1px solid rgba(61, 52, 41, 0.08);
    cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s;
    background: var(--heatmap-empty);
  }

  .cell:hover {
    border-color: var(--text-dim);
    box-shadow: inset 0 0 0 1px var(--text-dim);
  }

  .cell.selected {
    border-color: var(--accent);
    box-shadow: inset 0 0 0 2px var(--accent);
  }

  .cell.today {
    outline: 2px solid var(--text-dim);
    outline-offset: 1px;
  }

  .cell.pad {
    visibility: hidden;
    pointer-events: none;
  }

  .heatmap-meta {
    margin-top: 0.75rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    text-align: center;
  }

  /* day detail */
  .day-detail {
    background: var(--surface-inset);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
    min-height: 100px;
  }

  .day-detail-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.85rem;
    gap: 0.5rem;
  }

  .day-detail h2 {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--accent);
  }

  .day-total {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-weight: 500;
    white-space: nowrap;
  }

  .sessions {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .session-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .session-track {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    min-width: 4px;
    opacity: 0.1;
    border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    pointer-events: none;
  }

  .session-fill {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    min-width: 4px;
    opacity: 0.5;
    border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    pointer-events: none;
    transition: width 0.2s ease;
  }

  .session-content {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.55rem 0.65rem;
  }

  .session-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .session-info {
    flex: 1;
    min-width: 0;
  }

  .session-name {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .session-dur {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text);
    background: var(--surface-inset);
    padding: 0.15rem 0.5rem;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .session-delete {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    padding: 0.15rem 0.25rem;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
    flex-shrink: 0;
  }

  .session-card:hover .session-delete {
    opacity: 1;
  }

  .session-delete:hover {
    color: var(--accent);
    background: rgba(196, 105, 90, 0.1);
  }

  @media (hover: none) {
    .session-delete { opacity: 0.6; }
  }

  .empty-day {
    color: var(--text-dim);
    font-size: 0.82rem;
    text-align: center;
    padding: 0.5rem 0;
  }

  /* modals */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61, 52, 41, 0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.35rem;
    width: 100%;
    max-width: 360px;
    box-shadow: var(--shadow-lg);
  }

  .modal h3 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 1.1rem;
  }

  .form-group {
    margin-bottom: 0.85rem;
  }

  .form-group label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 0.3rem;
    text-transform: lowercase;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    background: var(--surface-inset);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.5rem 0.65rem;
    border-radius: var(--radius-sm);
    color-scheme: light;
  }

  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(196, 105, 90, 0.15);
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .slider-row input[type="range"] {
    flex: 1;
    height: 6px;
    appearance: none;
    background: var(--surface-inset);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    cursor: pointer;
  }

  .slider-row input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--surface);
    box-shadow: var(--shadow);
  }

  .slider-row input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--surface);
    box-shadow: var(--shadow);
  }

  .slider-val {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-dim);
    min-width: 2.5rem;
    text-align: right;
  }

  .slider-ticks {
    display: flex;
    justify-content: space-between;
    padding: 0.25rem 0.5rem 0;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  .form-actions {
    display: flex;
    gap: 0.45rem;
    margin-top: 1.1rem;
    flex-wrap: wrap;
  }

  .form-actions .btn { flex: 1; min-width: 100px; }
</style>
</head>
<body>

<div class="app-window">

<header>
  <h1>calm focus log</h1>
  <button class="btn btn-primary" id="add-btn">+ session</button>
</header>

<section class="heatmap-section">
  <div class="heatmap-card">
    <div class="heatmap-wrap">
      <div class="heatmap" id="heatmap"></div>
    </div>
    <div class="heatmap-meta" id="heatmap-meta"></div>
  </div>
</section>

<section class="day-detail" id="day-detail">
  <div class="day-detail-header">
    <h2 id="selected-date-label">—</h2>
    <div class="day-total" id="day-total"></div>
  </div>
  <div class="sessions" id="sessions"></div>
</section>

</div>

<!-- add session modal -->
<div class="overlay" id="add-modal">
  <div class="modal">
    <h3>log session</h3>
    <div class="form-group">
      <label for="session-date">date</label>
      <input type="date" id="session-date">
    </div>
    <div class="form-group">
      <label for="session-label">label</label>
      <input type="text" id="session-label" placeholder="..." autocomplete="off">
    </div>
    <div class="form-group">
      <label for="session-dur">duration (min)</label>
      <input type="number" id="session-dur" min="1" max="480" value="25">
    </div>
    <div class="form-group">
      <label for="session-pct">completion</label>
      <div class="slider-row">
        <input type="range" id="session-pct" min="80" max="100" step="10" value="100">
        <span class="slider-val" id="session-pct-val">100%</span>
      </div>
      <div class="slider-ticks">
        <span>80</span>
        <span>90</span>
        <span>100</span>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="log-it-btn">log</button>
      <button class="btn btn-dim" id="cancel-add-btn">cancel</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'focus-tracker-data';
  const DAYS = 90;
  const SESSION_COLOR = '#6b8f5e';

  let data = {};
  let selectedDate = todayStr();
  const inPlugin = window.parent !== window;

  // ── storage ──

  function loadLocal() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch {
      return {};
    }
  }

  function saveData() {
    if (inPlugin) {
      window.parent.postMessage({ source: 'focus-tracker', type: 'save', payload: data }, '*');
    } else {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
  }

  function boot(initial) {
    data = initial || loadLocal();
    renderAll();
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  // ── dates ──

  function todayStr() {
    return fmtDate(new Date());
  }

  function fmtDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function parseDate(s) {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function addDays(d, n) {
    const r = new Date(d);
    r.setDate(r.getDate() + n);
    return r;
  }

  function sessionPct(s) {
    if (s.pct != null) return Number(s.pct) || 100;
    if (s.status === 'incomplete') return 80;
    return 100;
  }

  function effectiveDur(s) {
    return s.dur * sessionPct(s) / 100;
  }

  function dayMinutes(dateStr) {
    const sessions = data[dateStr];
    if (!sessions) return 0;
    return sessions.reduce((sum, s) => sum + effectiveDur(s), 0);
  }

  function maxMinutesInRange(dates) {
    let max = 0;
    for (const d of dates) {
      const m = dayMinutes(d);
      if (m > max) max = m;
    }
    return max || 1;
  }

  function cellColor(mins, maxMins) {
    if (mins === 0) return '#e0dcd4';
    const t = Math.min(mins / maxMins, 1);
    if (t <= 0.33) return lerpColor('#e0dcd4', '#d4dfc9', t / 0.33);
    if (t <= 0.66) return lerpColor('#d4dfc9', '#a3b896', (t - 0.33) / 0.33);
    return lerpColor('#a3b896', '#6b8f5e', (t - 0.66) / 0.34);
  }

  function lerpColor(a, b, t) {
    const pa = hexRgb(a), pb = hexRgb(b);
    const r = Math.round(pa.r + (pb.r - pa.r) * t);
    const g = Math.round(pa.g + (pb.g - pa.g) * t);
    const bl = Math.round(pa.b + (pb.b - pa.b) * t);
    return `rgb(${r},${g},${bl})`;
  }

  function hexRgb(h) {
    const n = parseInt(h.slice(1), 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }

  function fmtDisplayDate(s) {
    const d = parseDate(s);
    const days = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
    const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  // ── render heatmap ──

  function getDateRange() {
    const end = new Date();
    end.setHours(0, 0, 0, 0);
    const start = addDays(end, -(DAYS - 1));
    const dates = [];
    for (let i = 0; i < DAYS; i++) {
      dates.push(fmtDate(addDays(start, i)));
    }
    return dates;
  }

  function renderHeatmap() {
    const dates = getDateRange();
    const maxMins = maxMinutesInRange(dates);
    const container = document.getElementById('heatmap');
    container.innerHTML = '';

    const startDate = parseDate(dates[0]);
    const startDow = startDate.getDay();

    // pad beginning so grid aligns to weekdays
    for (let i = 0; i < startDow; i++) {
      const pad = document.createElement('div');
      pad.className = 'cell pad';
      container.appendChild(pad);
    }

    const today = todayStr();
    const totalCols = startDow + dates.length;
    container.style.setProperty('--heatmap-cols', totalCols);

    dates.forEach(dateStr => {
      const mins = dayMinutes(dateStr);
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.background = cellColor(mins, maxMins);
      cell.title = `${dateStr}: ${mins} min`;
      cell.dataset.date = dateStr;
      if (dateStr === selectedDate) cell.classList.add('selected');
      if (dateStr === today) cell.classList.add('today');
      cell.addEventListener('click', () => selectDate(dateStr));
      container.appendChild(cell);
    });

    const totalMins = dates.reduce((s, d) => s + dayMinutes(d), 0);
    document.getElementById('heatmap-meta').textContent =
      `${DAYS} days · ${totalMins} min total`;
  }

  // ── render day detail ──

  function selectDate(dateStr) {
    selectedDate = dateStr;
    document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected'));
    const cell = document.querySelector(`.cell[data-date="${dateStr}"]`);
    if (cell) cell.classList.add('selected');
    syncDateInput(dateStr);
    renderDayDetail();
  }

  function syncDateInput(dateStr) {
    const el = document.getElementById('session-date');
    if (el) el.value = dateStr;
  }

  function getLogDate() {
    const el = document.getElementById('session-date');
    return (el && el.value) ? el.value : selectedDate;
  }

  function setDateInputBounds() {
    const el = document.getElementById('session-date');
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    el.max = fmtDate(today);
    el.min = fmtDate(addDays(today, -(DAYS - 1)));
  }

  function deleteSession(dateStr, sessionId) {
    if (!data[dateStr]) return;
    data[dateStr] = data[dateStr].filter(s => s.id !== sessionId);
    if (data[dateStr].length === 0) delete data[dateStr];
    saveData();
    renderAll();
  }

  function renderDayDetail() {
    document.getElementById('selected-date-label').textContent = fmtDisplayDate(selectedDate);
    const sessions = data[selectedDate] || [];
    const total = Math.round(sessions.reduce((s, x) => s + effectiveDur(x), 0));
    document.getElementById('day-total').textContent =
      total > 0 ? `${total} min` : '';

    const container = document.getElementById('sessions');
    container.innerHTML = '';

    if (sessions.length === 0) {
      container.innerHTML = '<div class="empty-day">—</div>';
      return;
    }

    sessions.forEach(session => {
      const name = session.label || 'session';
      const pct = Math.min(100, Math.max(0, sessionPct(session)));

      const card = document.createElement('div');
      card.className = 'session-card';

      const track = document.createElement('div');
      track.className = 'session-track';
      track.style.width = '100%';
      track.style.background = SESSION_COLOR;

      const fill = document.createElement('div');
      fill.className = 'session-fill';
      fill.style.width = pct + '%';
      fill.style.background = SESSION_COLOR;

      const content = document.createElement('div');
      content.className = 'session-content';

      const dot = document.createElement('div');
      dot.className = 'session-dot';
      dot.style.background = SESSION_COLOR;

      const info = document.createElement('div');
      info.className = 'session-info';

      const nameEl = document.createElement('div');
      nameEl.className = 'session-name';
      nameEl.textContent = name;

      info.appendChild(nameEl);

      const dur = document.createElement('div');
      dur.className = 'session-dur';
      dur.textContent = session.dur + ' min';

      const del = document.createElement('button');
      del.className = 'session-delete';
      del.textContent = '×';
      del.title = 'delete';
      del.addEventListener('click', () => deleteSession(selectedDate, session.id));

      content.appendChild(dot);
      content.appendChild(info);
      content.appendChild(dur);
      content.appendChild(del);
      card.appendChild(track);
      card.appendChild(fill);
      card.appendChild(content);
      container.appendChild(card);
    });
  }

  function renderAll() {
    renderHeatmap();
    renderDayDetail();
  }

  // ── add session ──

  function addSession(label, dur, pct, dateStr) {
    const target = dateStr || getLogDate();
    if (!data[target]) data[target] = [];
    data[target].push({ id: uid(), label, dur: Number(dur), pct: Number(pct) });
    selectedDate = target;
    saveData();
    renderAll();
  }

  // ── modals ──

  const addModal = document.getElementById('add-modal');

  document.getElementById('add-btn').addEventListener('click', () => {
    document.getElementById('session-label').value = '';
    document.getElementById('session-dur').value = '25';
    document.getElementById('session-pct').value = '100';
    document.getElementById('session-pct-val').textContent = '100%';
    setDateInputBounds();
    syncDateInput(selectedDate);
    addModal.classList.add('active');
    document.getElementById('session-label').focus();
  });

  document.getElementById('session-pct').addEventListener('input', () => {
    document.getElementById('session-pct-val').textContent =
      document.getElementById('session-pct').value + '%';
  });

  document.getElementById('session-date').addEventListener('change', () => {
    const d = getLogDate();
    if (d) selectDate(d);
  });

  document.getElementById('cancel-add-btn').addEventListener('click', () => {
    addModal.classList.remove('active');
  });

  document.getElementById('log-it-btn').addEventListener('click', () => {
    const label = document.getElementById('session-label').value.trim();
    const dur = document.getElementById('session-dur').value;
    const pct = document.getElementById('session-pct').value;
    if (!dur || dur < 1) return;
    addSession(label, dur, pct, getLogDate());
    addModal.classList.remove('active');
  });

  addModal.addEventListener('click', e => {
    if (e.target === addModal) addModal.classList.remove('active');
  });

  // keyboard: escape closes add modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (addModal.classList.contains('active')) addModal.classList.remove('active');
    }
  });

  if (inPlugin) {
    window.addEventListener('message', (e) => {
      if (e.data?.source !== 'focus-tracker-plugin') return;
      if (e.data.type === 'init') boot(e.data.result);
    });
    window.parent.postMessage({ source: 'focus-tracker', type: 'ready' }, '*');
  } else {
    boot();
  }
})();
</script>
</body>
</html>
